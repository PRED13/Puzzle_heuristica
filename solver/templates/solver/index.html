<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Puzzle Heurística</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Puzzle Heurística</h1>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium">Estado Inicial (ej: 4,2,3,1)</label>
                <input type="text" name="inicio" required class="w-full border p-2 rounded" placeholder="4, 2, 3, 1">
            </div>
            <div>
                <label class="block text-sm font-medium">Solución Objetivo (ej: 1,2,3,4)</label>
                <input type="text" name="meta" required class="w-full border p-2 rounded" placeholder="1, 2, 3, 4">
            </div>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Resolver</button>
        </form>

        {% if error %}
        <div class="mt-6 p-4 bg-red-100 text-red-700 rounded">{{ error }}</div>
        {% endif %}

        {% if resultado %}
        <div class="mt-8">
            <h2 class="text-xl font-semibold mb-4">Pasos para la solución:</h2>
            <div class="space-y-2">
                {% for paso in resultado %}
                <div class="flex items-center space-x-2">
                    <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-mono">{{ paso }}</span>
                    {% if not forloop.last %} <span class="text-gray-400">→</span> {% endif %}
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
